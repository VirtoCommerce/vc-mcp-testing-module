name: Regression Tests

on:
  workflow_dispatch:
    inputs:
      suite_selection:
        description: 'Suites: smoke, full, critical, sprint, frontend, backend, or comma-separated IDs (01,04a,06)'
        required: true
        default: 'smoke'
        type: string
      environment:
        description: 'Test environment'
        required: true
        default: 'qa'
        type: choice
        options:
          - qa
          - staging
      max_budget:
        description: 'Max budget in USD'
        required: true
        default: '10.0'
        type: string
      max_turns:
        description: 'Max turns per suite'
        required: true
        default: '100'
        type: string
      model:
        description: 'Claude model'
        required: true
        default: 'claude-sonnet-4-5-20250929'
        type: choice
        options:
          - claude-sonnet-4-5-20250929
          - claude-opus-4-6
      max_parallel:
        description: 'Max parallel suites (1-3)'
        required: false
        default: '3'
        type: string
      suite_timeout_ms:
        description: 'Per-suite timeout in ms (default: 600000 = 10 min)'
        required: false
        default: '600000'
        type: string
  # schedule:
  #   - cron: '0 6 * * 1-5'  # Daily smoke: Mon-Fri at 6:00 AM UTC
  #   - cron: '0 2 * * 0'     # Weekly full regression: Sunday at 2:00 AM UTC

# Prevent overlapping runs for the same selection
concurrency:
  group: regression-${{ github.event.inputs.suite_selection || 'scheduled' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    env:
      # Resolve schedule-aware defaults
      SUITE_SELECTION: >-
        ${{
          github.event_name == 'workflow_dispatch' && inputs.suite_selection ||
          github.event.schedule == '0 6 * * 1-5' && 'smoke' ||
          github.event.schedule == '0 2 * * 0' && 'full' ||
          'smoke'
        }}
      TEST_ENVIRONMENT: >-
        ${{
          github.event_name == 'workflow_dispatch' && inputs.environment ||
          'qa'
        }}
      MAX_BUDGET_USD: >-
        ${{
          github.event_name == 'workflow_dispatch' && inputs.max_budget ||
          github.event.schedule == '0 2 * * 0' && '80.0' ||
          '5.0'
        }}
      MAX_TURNS: >-
        ${{
          github.event_name == 'workflow_dispatch' && inputs.max_turns ||
          '100'
        }}
      MODEL: >-
        ${{
          github.event_name == 'workflow_dispatch' && inputs.model ||
          'claude-sonnet-4-5-20250929'
        }}
      MAX_PARALLEL: >-
        ${{
          github.event_name == 'workflow_dispatch' && inputs.max_parallel ||
          '3'
        }}
      SUITE_TIMEOUT_MS: >-
        ${{
          github.event_name == 'workflow_dispatch' && inputs.suite_timeout_ms ||
          '600000'
        }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Log run configuration
        run: |
          echo "=== Regression Run Configuration ==="
          echo "Trigger: ${{ github.event_name }}"
          echo "Suite Selection: ${{ env.SUITE_SELECTION }}"
          echo "Environment: ${{ env.TEST_ENVIRONMENT }}"
          echo "Max Budget: \$${{ env.MAX_BUDGET_USD }}"
          echo "Max Turns: ${{ env.MAX_TURNS }}"
          echo "Model: ${{ env.MODEL }}"
          echo "Max Parallel: ${{ env.MAX_PARALLEL }}"
          echo "Suite Timeout: ${{ env.SUITE_TIMEOUT_MS }}ms"

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ci/Dockerfile
          tags: vc-regression:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run regression tests
        id: regression
        run: |
          docker run --rm \
            --shm-size=2gb \
            -e ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }} \
            -e SUITE_SELECTION="${{ env.SUITE_SELECTION }}" \
            -e TEST_ENVIRONMENT="${{ env.TEST_ENVIRONMENT }}" \
            -e MAX_BUDGET_USD="${{ env.MAX_BUDGET_USD }}" \
            -e MAX_TURNS="${{ env.MAX_TURNS }}" \
            -e MODEL="${{ env.MODEL }}" \
            -e MAX_PARALLEL="${{ env.MAX_PARALLEL }}" \
            -e SUITE_TIMEOUT_MS="${{ env.SUITE_TIMEOUT_MS }}" \
            -e FRONT_URL="${{ secrets.FRONT_URL }}" \
            -e BACK_URL="${{ secrets.BACK_URL }}" \
            -e VIRTO_START_FRONT="${{ secrets.VIRTO_START_FRONT }}" \
            -e VIRTO_START_BACK="${{ secrets.VIRTO_START_BACK }}" \
            -e ADMIN="${{ secrets.ADMIN }}" \
            -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
            -e USER_EMAIL="${{ secrets.USER_EMAIL }}" \
            -e USER_PASSWORD="${{ secrets.USER_PASSWORD }}" \
            -e USER2_EMAIL="${{ secrets.USER2_EMAIL }}" \
            -e USER2_PASSWORD="${{ secrets.USER2_PASSWORD }}" \
            -e USER_VIRTO="${{ secrets.USER_VIRTO }}" \
            -e USER_VIRTO_PASSWORD="${{ secrets.USER_VIRTO_PASSWORD }}" \
            -e STORE_ID="${{ secrets.STORE_ID }}" \
            -e SKYFLOW_VISA="${{ secrets.SKYFLOW_VISA }}" \
            -e SKYFLOW_MASTERCARD="${{ secrets.SKYFLOW_MASTERCARD }}" \
            -e SKYFLOW_EXPIRY="${{ secrets.SKYFLOW_EXPIRY }}" \
            -e SKYFLOW_CVV="${{ secrets.SKYFLOW_CVV }}" \
            -e CYBERSOURCE_CARD="${{ secrets.CYBERSOURCE_CARD }}" \
            -e CYBERSOURCE_EXPIRY="${{ secrets.CYBERSOURCE_EXPIRY }}" \
            -e CYBERSOURCE_CVV="${{ secrets.CYBERSOURCE_CVV }}" \
            -e AUTHORIZNET_CARD="${{ secrets.AUTHORIZNET_CARD }}" \
            -e AUTHORIZNET_EXPIRY="${{ secrets.AUTHORIZNET_EXPIRY }}" \
            -e AUTHORIZNET_CVV="${{ secrets.AUTHORIZNET_CVV }}" \
            -e DATATRANCE_MASTERCARD="${{ secrets.DATATRANCE_MASTERCARD }}" \
            -e DATATRANCE_EXPIRY="${{ secrets.DATATRANCE_EXPIRY }}" \
            -e DATATRANCE_CVV="${{ secrets.DATATRANCE_CVV }}" \
            -e DATATRANCE_OTP="${{ secrets.DATATRANCE_OTP }}" \
            -v ${{ github.workspace }}/test-results:/app/test-results \
            -v ${{ github.workspace }}/reports:/app/reports \
            vc-regression
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          # Exit 0 = all passed, 1 = real failures, 2 = budget/turn limits only
          if [ $EXIT_CODE -eq 2 ]; then
            echo "::warning::Some suites hit budget/turn limits but no real failures"
          fi
          exit $EXIT_CODE

      - name: Read run summary
        if: always()
        id: summary
        run: |
          SUMMARY_FILE=$(find reports/regression -name "summary.json" -type f | sort -r | head -1)
          if [ -n "$SUMMARY_FILE" ]; then
            PASS_RATE=$(jq -r '.passRate // 0' "$SUMMARY_FILE")
            TOTAL_COST=$(jq -r '.totalCostUsd // 0' "$SUMMARY_FILE")
            PASSED=$(jq -r '.passed // 0' "$SUMMARY_FILE")
            FAILED=$(jq -r '.failed // 0' "$SUMMARY_FILE")
            BLOCKED=$(jq -r '.blocked // 0' "$SUMMARY_FILE")
            echo "pass_rate=$PASS_RATE" >> $GITHUB_OUTPUT
            echo "total_cost=$TOTAL_COST" >> $GITHUB_OUTPUT
            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
            echo "blocked=$BLOCKED" >> $GITHUB_OUTPUT
            echo "summary_path=$SUMMARY_FILE" >> $GITHUB_OUTPUT
            echo "### Regression Results" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Pass Rate | ${PASS_RATE}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "| Blocked | $BLOCKED |" >> $GITHUB_STEP_SUMMARY
            echo "| Cost | \$${TOTAL_COST} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "::warning::No summary.json found"
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-${{ env.SUITE_SELECTION }}-${{ github.run_number }}
          path: |
            test-results/
            reports/regression/
          retention-days: 60

      - name: Send Teams notification
        if: always()
        run: npx tsx ci/notify-teams.ts
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          RUN_STATUS: ${{ job.status }}
          REGRESSION_RUN_ID: ${{ steps.summary.outputs.summary_path && 'ci-' || '' }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TRIGGER: ${{ github.event_name }}
          SUITE_SELECTION: ${{ env.SUITE_SELECTION }}
          TEST_ENVIRONMENT: ${{ env.TEST_ENVIRONMENT }}
