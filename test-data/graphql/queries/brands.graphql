# name: brands
# category: catalog
# role: PUBLIC or ORG_USER
# purpose: List brands available in a store (paginated, sortable)
# required-vars: STORE_ID (String)
# optional-vars: (none)
# last-validated: 2026-05-15
# known-issues:
#   - The brands query uses "keyword" arg (not "query" like products)
# gql-vars: { "first": "Int", "sort": "String", "keyword": "String" }
# runner-note: Pass paging/sort via [GQL-VARS label] JSON, e.g. {"first": 5, "sort": "name:asc"}
# example-vars: {"first": 5, "sort": "name:asc"}

query Brands($first: Int, $sort: String, $keyword: String) {
  brands(
    storeId: "{{STORE_ID}}"
    first: $first
    sort: $sort
    keyword: $keyword
  ) {
    totalCount
    items {
      id
      name
      permalink
      logoUrl
      featured
    }
  }
}
