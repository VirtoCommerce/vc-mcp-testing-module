# name: orders-list
# category: orders
# role: ORG_USER
# purpose: Customer orders list, sorted createdDate desc
# required-vars: (none)
# optional-vars: FIRST (Int, default 10)
# last-validated: 2026-04-24
# known-issues: (none)
# used-by: GQL-011, GQL-012 (list_first to capture first order number), GQL-013

query {
  orders(first: 10, sort: "createdDate:desc") {
    totalCount
    items {
      id number status createdDate
      total { amount currency { code } }
    }
  }
}
