# name: configurationItems
# category: configurable-products
# role: ORG_USER
# purpose: Read back the configuration items currently attached to a cart line item
# required-vars: STORE_ID (String), CURRENCY_CODE (String, e.g. "USD"), LINE_ITEM_ID (String — capture from cart line item)
# optional-vars: CART_ID (String), CART_NAME (String), CART_TYPE (String), USER_ID (String), CULTURE_NAME (String)
# last-validated: 2026-05-15
# known-issues: (none)

query {
  configurationItems(
    storeId: "{{STORE_ID}}"
    currencyCode: "USD"
    lineItemId: "{{LINE_ITEM_ID}}"
    userId: "{{USER_ID}}"
    cultureName: "en-US"
  ) {
    configurationItems {
      id
      sectionId
      type
      productId
      name
      sku
      quantity
      customText
      selectedForCheckout
      listPrice { amount currency { code } }
      salePrice { amount currency { code } }
      extendedPrice { amount currency { code } }
      files { url name size contentType }
    }
  }
}
