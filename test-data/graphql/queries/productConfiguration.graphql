# name: productConfiguration
# category: configurable-products
# role: PUBLIC or ORG_USER
# purpose: Fetch the configuration definition for a configurable product (sections + options + dependsOnSectionId for conditional cascades)
# required-vars: STORE_ID (String, e.g. "B2B-store"), CONFIGURABLE_PRODUCT_ID (String — e.g. CFG-013 GUID dd56d770-3c3b-4e09-b126-0c2bb8bd0f72)
# optional-vars: USER_ID (String), CULTURE_NAME (String, default "en-US"), CURRENCY_CODE (String, default "USD")
# return-type: ConfigurationQueryResponseType → configurationSections: [ConfigurationSectionType]
#   section.options: [ConfigurationLineItemType]   (NOT ConfigurationOptionType — that type does not exist)
# last-validated: 2026-05-27 (live introspection + live query against vcst-qa B2B-store / CFG-013 dd56d770-…)
# known-issues:
#   - Argument descriptions in the live schema are swapped:
#       cultureName.description = "Currency code (\"USD\")"
#       currencyCode.description = "Culture name (\"en-US\")"
#     Actual semantics are correct (cultureName = "en-US", currencyCode = "USD"); descriptions are a platform bug.
#   - Section.allowTextOptions defaults to `true` even on Product-type sections (where it has no effect) — do not assert it false for Product sections.

query {
  productConfiguration(
    configurableProductId: "{{CONFIGURABLE_PRODUCT_ID}}"
    storeId: "{{STORE_ID}}"
    userId: "{{USER_ID}}"
    cultureName: "en-US"
    currencyCode: "USD"
  ) {
    configurationSections {
      id
      name
      description
      isRequired
      type
      allowCustomText
      allowTextOptions
      maxLength
      dependsOnSectionId
      options {
        id
        text
        quantity
        isDefault
        product { id name slug code }
        currency { code }
        listPrice { amount currency { code } }
        salePrice { amount currency { code } }
        extendedPrice { amount currency { code } }
        discountAmount { amount currency { code } }
      }
    }
  }
}
