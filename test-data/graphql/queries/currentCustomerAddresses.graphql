# name: currentCustomerAddresses
# category: profile
# role: ORG_USER
# purpose: Current user's saved addresses with facets (paginated)
# required-vars: (none)
# optional-vars: FIRST (Int, default 20)
# last-validated: 2026-05-20
# known-issues: (none)
# used-by: GQL-048

query {
  currentCustomerAddresses(first: 20) {
    totalCount
    items {
      id city countryCode countryName firstName lastName
      line1 line2 postalCode regionId regionName
      phone email addressType isDefault isFavorite description
    }
    term_facets { name terms { term label count } }
  }
}
