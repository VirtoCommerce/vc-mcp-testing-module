# name: unSelectAllCartConfigurationItems
# category: configurable-products
# role: ORG_USER
# purpose: Unselect ALL configuration items within a single lineItem (hardcoded selectedForCheckout=false for every config item on that lineItem). Scoped strictly to the lineItemId — other configured lineItems in the same cart are untouched.
# required-vars: STORE_ID (String), USER_ID (String), LINE_ITEM_ID (String)
# optional-vars: cartName (String), cartType (String), cultureName (String), currencyCode (String)
# last-validated: 2026-05-06
# known-issues:
#   - Selection toggle triggers UpdateConfiguredLineItemPrice ONLY when an actual flag flips (no-change short-circuit). Selection state filters which placements sum into items.listPrice.
#   - Scoped to lineItemId only — other configured lineItems in cart are NOT affected.
# gql-vars: (none — no configurationSections array; command contains lineItemId only)
# runner-note: No GQL variables needed. The mutation takes only standard cart context fields + lineItemId. All config items on the lineItem are set to selectedForCheckout=false.
# example-vars: {}

mutation UnSelectAllCartConfigurationItems {
  unSelectAllCartConfigurationItems(command: {
    storeId: "{{STORE_ID}}"
    userId: "{{USER_ID}}"
    lineItemId: "{{LINE_ITEM_ID}}"
  }) {
    id
    itemsCount
    subTotal { amount currency { code } }
    total { amount currency { code } }
    items {
      id
      productId
      quantity
      listPrice { amount currency { code } }
      extendedPrice { amount currency { code } }
      configurationItems {
        id
        sectionId
        type
        productId
        customText
        selectedForCheckout
      }
    }
  }
}
