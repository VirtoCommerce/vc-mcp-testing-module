# name: updateConfigurationItems
# category: configurable-products
# role: ORG_USER
# purpose: Bulk-update multiple configuration sections on a cart line item in one round-trip
# required-vars: STORE_ID (String), USER_ID (String), LINE_ITEM_ID (String)
# optional-vars: (none)
# last-validated: 2026-05-15
# known-issues:
#   - REPLACE semantics — pass full desired list each call.
# gql-vars: { "configurationSections": "[ConfigurationSectionInput!]!" }

mutation UpdateConfigurationItems($configurationSections: [ConfigurationSectionInput!]!) {
  updateConfigurationItems(command: {
    storeId: "{{STORE_ID}}"
    userId: "{{USER_ID}}"
    lineItemId: "{{LINE_ITEM_ID}}"
    configurationSections: $configurationSections
  }) {
    id
    itemsCount
    items {
      id
      configurationItems { id sectionId type productId customText }
    }
  }
}
