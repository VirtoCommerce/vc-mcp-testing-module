# name: updateConfigurationItem
# category: configurable-products
# role: ORG_USER
# purpose: Update a single configuration section on a cart line item (e.g. swap option, change customText, replace files)
# required-vars: STORE_ID (String), USER_ID (String), LINE_ITEM_ID (String)
# optional-vars: (none)
# last-validated: 2026-05-15
# known-issues:
#   - REPLACE semantics — pass full desired ConfigurationSectionInput each call.
# gql-vars: { "configurationSection": "ConfigurationSectionInput!" }

mutation UpdateConfigurationItem($configurationSection: ConfigurationSectionInput!) {
  updateConfigurationItem(command: {
    storeId: "{{STORE_ID}}"
    userId: "{{USER_ID}}"
    lineItemId: "{{LINE_ITEM_ID}}"
    configurationSection: $configurationSection
  }) {
    id
    itemsCount
    items {
      id
      configurationItems {
        id sectionId type productId customText quantity
        extendedPrice { amount }
      }
    }
  }
}
