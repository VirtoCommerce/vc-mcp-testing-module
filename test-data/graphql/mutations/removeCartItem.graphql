# name: removeCartItem
# category: cart
# role: ORG_USER
# purpose: Remove a line item from the cart by lineItemId
# required-vars: STORE_ID (String), USER_ID (String), LINE_ITEM_ID (String)
# optional-vars: (none)
# last-validated: 2026-04-24
# known-issues: (none)
# used-by: (future) 050b cart remove suites

mutation {
  removeCartItem(command: {
    storeId: "{{STORE_ID}}"
    userId: "{{USER_ID}}"
    lineItemId: "{{LINE_ITEM_ID}}"
  }) {
    id
    itemsCount
    items { id productId sku name quantity }
  }
}
