# name: createOrderFromCart
# category: order
# role: ORG_USER
# purpose: Convert a finalized cart into a customer order — terminal step of GraphQL checkout flow
# required-vars: CART_ID (String — capture from earlier cart query/mutation)
# optional-vars: (none)
# last-validated: 2026-04-27
# known-issues:
#   - Creates a real order in the system; no easy teardown via runner — use sparingly or against disposable accounts.
# used-by: 050b3, 050c, 050b4 (full-checkout flow tests)

mutation {
  createOrderFromCart(command: {
    cartId: "{{CART_ID}}"
  }) {
    id
    number
    status
    customerId
    storeId
    total { amount currency { code } }
    items { id productId name quantity }
  }
}
