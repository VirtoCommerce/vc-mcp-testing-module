# name: createWishlist
# category: wishlist
# role: ORG_USER
# purpose: Create a new wishlist for the current user
# required-vars: STORE_ID (String), USER_ID (String), LIST_NAME (String)
# optional-vars: DESCRIPTION (String), SCOPE (String — "Private" | "Public" | "Organization")
# last-validated: 2026-04-24
# known-issues: (none)
# used-by: (future) 050h wishlist create suite
# cleanup-required: YES — always pair with removeWishlist using the returned id

mutation {
  createWishlist(command: {
    storeId: "{{STORE_ID}}"
    userId: "{{USER_ID}}"
    listName: "{{LIST_NAME}}"
  }) {
    id
    name
    customerId
    scope
    itemsCount
  }
}
