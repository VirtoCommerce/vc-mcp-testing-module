# Variables: {"domain":"vcst-qa-storefront.govirto.com","userId":"16c84249-c462-4fc2-8f82-e52d90be472d","permalink":"contact"}

query GetPageContext($userId: String, $organizationId: String, $domain: String, $storeId: String, $permalink: String, $cultureName: String) {
  pageContext(
    userId: $userId
    organizationId: $organizationId
    domain: $domain
    storeId: $storeId
    permalink: $permalink
    cultureName: $cultureName
  ) {
    user      { ...userTypeFields __typename }
    store     { ...storeResponseTypeFields __typename }
    slugInfo  { ...slugInfoResponseTypeFields __typename }
    # NOTE: no `whiteLabelingSettings { ... }` selection here — stripped by @needsModule gate
    __typename
  }
}

