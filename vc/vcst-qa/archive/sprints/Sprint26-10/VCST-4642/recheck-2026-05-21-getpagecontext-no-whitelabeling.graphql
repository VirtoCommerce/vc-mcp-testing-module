# Captured: 2026-05-21 (live recheck after Elena's request)
# URL: https://vcst-qa-storefront.govirto.com/contact (permalink: "contact")
# Manifest state: 82 modules, NO VirtoCommerce.WhiteLabeling, NO VirtoCommerce.WhiteLabeling.WhiteLabelingEnabled flag
# HTTP status: 200
# Observed: whiteLabelingSettings selection AND whiteLabelingFields fragment definition are BOTH stripped by apply-gates-link
